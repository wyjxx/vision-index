<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbox - vision-index</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }

        .topbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .filename {
            margin-top: 8px;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Inbox</h1>

    <div class="topbar">
        <a href="/viewer">View Indexed Images</a>
    </div>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <button type="submit">Upload</button>
    </form>

    <br>

    <form action="/index" method="post">
        <button type="submit">Run Pipeline</button>
    </form>

    <hr>

    <div class="grid">
        {% for image in images %}
        <div class="card">
            <img src="{{ image.file_path }}" alt="{{ image.file_name }}">
            <div class="filename">{{ image.file_name }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
